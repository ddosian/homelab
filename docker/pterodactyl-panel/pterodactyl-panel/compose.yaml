version: "3.8"
x-common:
  database: &db-environment
    MYSQL_PASSWORD: &db-password ${MYSQL_PASSWORD}
    MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  panel: &panel-environment
    APP_URL: "https://panel.meteoritehost.com"
    APP_TIMEZONE: "UTC"
    APP_SERVICE_AUTHOR: "noreply@meteoritehost.com"
    TRUSTED_PROXIES: "*"
  mail: &mail-environment
    MAIL_FROM: "noreply@meteoritehost.com"
    MAIL_DRIVER: "smtp"
    MAIL_HOST: "mail.dontddos.me"
    MAIL_PORT: "465"
    MAIL_USERNAME: "noreply@meteoritehost.com"
    MAIL_PASSWORD: ${MAIL_PASSWORD}
    MAIL_ENCRYPTION: "true"

#
# ------------------------------------------------------------------------------------------
# DANGER ZONE BELOW
#
# The remainder of this file likely does not need to be changed. Please only make modifications
# below if you understand what you are doing.
#
services:
  database:
    image: mariadb:10.5
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "/srv/pterodactyl/database:/var/lib/mysql"
    environment:
      <<: *db-environment
      MYSQL_DATABASE: "panel"
      MYSQL_USER: "pterodactyl"
    networks:
      - pterodactyl
  cache:
    image: redis:alpine
    restart: always
    networks:
      - pterodactyl
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    restart: unless-stopped
    links:
      - database
      - cache
    volumes:
      - "/srv/pterodactyl/var/:/app/var/"
      - "/srv/pterodactyl/nginx/:/etc/nginx/http.d/"
      - "/srv/pterodactyl/certs/:/etc/letsencrypt/"
      - "/srv/pterodactyl/logs/:/app/storage/logs"
    environment:
      <<: [*panel-environment, *mail-environment]
      DB_PASSWORD: *db-password
      APP_ENV: "production"
      APP_ENVIRONMENT_ONLY: "false"
      CACHE_DRIVER: "redis"
      SESSION_DRIVER: "redis"
      QUEUE_DRIVER: "redis"
      REDIS_HOST: "cache"
      DB_HOST: "database"
      DB_PORT: "3306"
    networks:
      - pterodactyl
      - newt
networks:
  newt:
    external: true
  pterodactyl:
